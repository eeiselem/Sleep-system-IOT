<div
    id="sleep-coach-stack"
    class="pointer-events-none fixed bottom-6 right-4 z-[100] flex w-[calc(100%-2rem)] max-w-[400px] flex-col items-end gap-3 sm:right-6"
    aria-live="polite"
>
    <div
        id="sleep-coach-panel"
        class="pointer-events-auto hidden flex h-[min(72vh,28rem)] w-full flex-col overflow-hidden rounded-2xl border border-white/15 bg-black/55 shadow-2xl shadow-black/60 backdrop-blur-xl ring-1 ring-white/[0.06]"
        role="dialog"
        aria-modal="false"
        aria-labelledby="sleep-coach-title"
    >
        <div class="flex items-center justify-between border-b border-white/10 px-4 py-3">
            <h2 id="sleep-coach-title" class="m-0 text-sm font-semibold tracking-wide text-zinc-100">
                Sleep Coach AI
            </h2>
            <button
                id="sleep-coach-close"
                type="button"
                class="rounded-lg p-1.5 text-zinc-500 transition hover:bg-white/10 hover:text-zinc-200"
                aria-label="Close Sleep Coach"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div
            id="sleep-coach-messages"
            class="min-h-0 flex-1 space-y-3 overflow-y-auto overscroll-y-contain px-3 py-3 touch-pan-y"
        ></div>
        <div class="border-t border-white/10 bg-black/30 p-3 backdrop-blur-sm">
            <div class="flex gap-2">
                <label class="sr-only" for="sleep-coach-input">Message Sleep Coach</label>
                <input
                    id="sleep-coach-input"
                    type="text"
                    autocomplete="off"
                    placeholder="Ask about sleep, room data…"
                    class="dash-coach-inp"
                />
                <button
                    id="sleep-coach-send"
                    type="button"
                    class="dash-btn shrink-0 px-4"
                >
                    Send
                </button>
            </div>
        </div>
    </div>
    <button
        id="sleep-coach-fab"
        type="button"
        class="pointer-events-auto flex h-14 w-14 shrink-0 items-center justify-center rounded-full border border-gray-700 bg-black/50 text-teal-300 shadow-xl shadow-black/40 backdrop-blur-md transition hover:border-teal-400/40 hover:text-amber-200 focus:outline-none focus:ring-2 focus:ring-teal-400/35"
        aria-label="Open Sleep Coach"
        aria-expanded="false"
        aria-controls="sleep-coach-panel"
    >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 9l-2 2 2 2" opacity=".75"/>
        </svg>
    </button>
</div>
